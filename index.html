<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ace Bercilla!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Press Start 2P',monospace;
  image-rendering:pixelated;
  -ms-interpolation-mode:nearest-neighbor;
  min-height:100vh;
  background:#0a0a1a;
  color:#fff;
  overflow-x:hidden;
  cursor:default;
}
.bg{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  background:url('images/pixel-sea-landscape-8-bit-sun-beach-with-wave-cloud-and-sand-game-summer-ocean-panorama-cloudy-blue-sky-with-horizon-background-pixels-island-scene-illustration-vector.jpg') center/cover no-repeat;
  z-index:0;
  opacity:.35;
  filter:brightness(.7) saturate(1.3);
}
.overlay{
  position:relative;z-index:1;
  min-height:100vh;
  background:rgba(10,10,30,.55);
  backdrop-filter:blur(2px);
  padding:20px 15px 40px;
}
.scanlines{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  z-index:3;
  pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.15) 2px,
    rgba(0,0,0,.15) 4px
  );
}
.container{max-width:1100px;margin:0 auto;text-align:center}

/* pixel border helper */
.pixel-border{
  border:4px solid #fff;
  box-shadow:
    inset -4px -4px 0 0 #666,
    inset 4px 4px 0 0 #ccc,
    4px 4px 0 0 #000;
  image-rendering:pixelated;
}

/* header */
h1{
  font-size:clamp(16px,4vw,36px);
  line-height:1.6;
  text-shadow:
    3px 3px 0 #ff0066,
    -2px -2px 0 #00ccff,
    0 0 20px rgba(255,255,255,.3);
  animation:glow 2s ease-in-out infinite alternate;
  margin-top:10px;
  letter-spacing:2px;
}
@keyframes glow{
  0%{text-shadow:3px 3px 0 #ff0066,-2px -2px 0 #00ccff,0 0 20px rgba(255,255,255,.2)}
  100%{text-shadow:3px 3px 0 #ffcc00,-2px -2px 0 #ff66cc,0 0 30px rgba(255,255,255,.5)}
}
.subtitle{
  font-size:clamp(8px,1.5vw,14px);
  color:#ffd700;
  margin-top:15px;
  text-shadow:2px 2px 0 #000;
  animation:flicker 3s linear infinite;
}
@keyframes flicker{
  0%,100%{opacity:1}
  50%{opacity:.7}
}

/* hero section - cake + ace side by side */
.hero{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:clamp(20px,5vw,60px);
  margin:20px auto;
  flex-wrap:wrap;
}

/* cake */
.cake-section{flex-shrink:0}
.cake-frame{
  display:inline-block;
  padding:10px;
  background:linear-gradient(135deg,#ff6b9d,#c44dff,#6b5bff);
  border:4px solid #fff;
  box-shadow:8px 8px 0 #000;
  animation:cakeFloat 3s ease-in-out infinite;
}
@keyframes cakeFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
.cake-frame img{
  display:block;
  max-width:min(260px,40vw);
  height:auto;
  image-rendering:pixelated;
  border:2px solid #fff;
}

/* ace - hero character */
.ace-hero{
  flex-shrink:0;
  text-align:center;
  position:relative;
  animation:heroBob 2s ease-in-out infinite;
}
@keyframes heroBob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.ace-hero-label{
  font-size:clamp(9px,1.5vw,13px);
  color:#ffd700;
  text-shadow:2px 2px 0 #000,0 0 10px rgba(255,215,0,.3);
  margin-bottom:8px;
  letter-spacing:2px;
}
#aceCanvas{
  display:block;
  width:256px;
  height:256px;
  image-rendering:pixelated;
  background:transparent;
  cursor:pointer;
}
.ace-hero-glint{
  position:absolute;
  top:-16px;
  right:-16px;
  font-size:20px;
  animation:spinGlint 3s linear infinite;
  pointer-events:none;
}
@keyframes spinGlint{
  0%{transform:rotate(0deg) scale(1);opacity:1}
  50%{transform:rotate(180deg) scale(1.3);opacity:.7}
  100%{transform:rotate(360deg) scale(1);opacity:1}
}
.ace-hero-controls{
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:6px;
}
.ace-btn{
  background:rgba(0,0,0,.5);
  border:2px solid rgba(255,255,255,.4);
  color:#fff;
  font-family:'Press Start 2P',monospace;
  font-size:6px;
  padding:4px 8px;
  cursor:pointer;
  image-rendering:pixelated;
  transition:background .2s;
}
.ace-btn:hover{background:#c44dff;border-color:#fff}
.ace-btn.active{background:#ffd700;color:#000;border-color:#fff}

/* cats */
.cat-zone{
  position:relative;
  margin:30px auto;
  max-width:800px;
}
.cat-stage{
  background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.3) 60%,#2a1a0a 85%,#1a0f05 100%);
  border:3px solid #fff;
  border-bottom:6px solid #4a3a2a;
  box-shadow:6px 6px 0 #000;
  padding:20px 15px 15px;
  position:relative;
  overflow:hidden;
}
.cat-stage-title{
  font-size:clamp(7px,1.2vw,10px);
  color:#ffd700;
  text-shadow:1px 1px 0 #000;
  margin-bottom:15px;
  letter-spacing:2px;
}
.cat-scene{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  min-height:110px;
  align-items:flex-end;
}
.cat-sprite{
  width:96px;
  height:96px;
  background-size:auto 100%;
  background-repeat:no-repeat;
  cursor:pointer;
  transition:transform .2s steps(4);
  position:relative;
  flex-shrink:0;
}
.cat-sprite.idle{
  animation:spriteWalk .6s steps(7) infinite;
}
.cat-sprite.jumping{
  animation:spriteJump .5s steps(13) forwards;
}
@keyframes spriteWalk{
  from{background-position:0 0}
  to{background-position:-672px 0}
}
@keyframes spriteJump{
  from{background-position:0 0}
  to{background-position:-1248px 0}
}
.cat-sprite .cat-label{
  position:absolute;
  bottom:-18px;
  left:50%;
  transform:translateX(-50%);
  font-size:5px;
  color:#ffd700;
  text-shadow:1px 1px 0 #000;
  white-space:nowrap;
  background:rgba(0,0,0,.6);
  padding:2px 4px;
  border:1px solid rgba(255,255,255,.3);
  letter-spacing:.5px;
}

/* decorations */
.floating{
  position:fixed;
  pointer-events:none;
  z-index:2;
}
.balloon{
  width:32px;height:40px;
  background:var(--c);
  border:2px solid #fff;
  border-radius:50% 50% 50% 50% / 40% 40% 60% 60%;
  position:absolute;
  animation:floatUp linear infinite;
  box-shadow:2px 2px 0 rgba(0,0,0,.5);
}
.balloon::after{
  content:'';
  position:absolute;
  bottom:-6px;left:50%;
  transform:translateX(-50%);
  width:2px;height:8px;
  background:#fff;
}
@keyframes floatUp{
  0%{transform:translateY(110vh) rotate(0)}
  100%{transform:translateY(-100px) rotate(10deg)}
}

.star{
  width:8px;height:8px;
  background:#ffd700;
  position:absolute;
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  animation:twinkle var(--d) ease-in-out infinite alternate;
  box-shadow:0 0 4px #ffd700;
}
@keyframes twinkle{
  0%{opacity:.3;transform:scale(.5)}
  100%{opacity:1;transform:scale(1.2)}
}

/* confetti canvas */
#confetti-canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:10;
}

/* music toggle */
.music-btn{
  position:fixed;
  top:15px;right:15px;
  z-index:20;
  background:#1a1a3e;
  border:3px solid #fff;
  color:#fff;
  font-family:'Press Start 2P',monospace;
  font-size:10px;
  padding:8px 12px;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
  transition:transform .1s steps(2);
  image-rendering:pixelated;
}
.music-btn:active{
  transform:translate(2px,2px);
  box-shadow:2px 2px 0 #000;
}

/* retro scrollbar */
::-webkit-scrollbar{width:12px}
::-webkit-scrollbar-track{background:#0a0a1a;border-left:2px solid #333}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#ff6b9d,#c44dff);border:2px solid #fff}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#ff8cb4,#d66eff)}

/* responsive */
@media(max-width:768px){
  .hero{gap:20px}
  .cake-frame img{max-width:min(200px,38vw)}
  #aceCanvas{width:200px;height:200px}
  .ace-hero-label{font-size:clamp(8px,2vw,11px)}
  .cat-sprite{width:80px;height:80px}
  .cat-scene{gap:10px}
  .overlay{padding:16px}
}
@media(max-width:540px){
  .hero{flex-direction:column;align-items:center;gap:12px}
  .cake-frame img{max-width:min(180px,55vw)}
  #aceCanvas{width:180px;height:180px}
  .ace-hero-glint{top:-10px;right:-10px;font-size:14px}
  .cat-sprite{width:64px;height:64px}
  .cat-scene{gap:8px}
  .cat-stage-title{font-size:7px}
  .cat-sprite .cat-label{font-size:4px;bottom:-14px}
  .ace-btn{font-size:5px;padding:3px 6px}
  .subtitle{font-size:7px}
  .overlay{padding:10px}
  .music-btn{top:10px;right:10px;font-size:8px;padding:6px 10px}
  .balloon{width:18px !important;height:24px !important}
}
@media(max-width:380px){
  h1{font-size:14px}
  .cake-frame img{max-width:min(140px,50vw)}
  #aceCanvas{width:140px;height:140px}
  .cake-frame{padding:6px}
  .ace-hero-label{font-size:7px}
  .cat-sprite{width:48px;height:48px}
  .cat-scene{gap:6px}
  .cat-stage{padding:12px 8px}
  .overlay{padding:8px}
  .ace-hero-controls{gap:4px}
  .star{display:none}
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="scanlines"></div>
<div class="overlay">

<div class="container">

  <h1>HAPPY BIRTHDAY<br>ACE BERCILLA!</h1>
  <p class="subtitle">&#9733; June 20, 2026 &#9733;</p>

  <div class="hero">
    <div class="cake-section">
      <div class="cake-frame">
        <img src="cake.jpg" alt="Birthday Cake">
      </div>
    </div>

    <div class="ace-hero">
      <div class="ace-hero-label">&#9733; ACE &#9733;</div>
      <canvas id="aceCanvas" width="128" height="128"></canvas>
      <span class="ace-hero-glint">&#10022;</span>
      <div class="ace-hero-controls">
        <button class="ace-btn active" data-speed="150" id="speedNormal">NORM</button>
        <button class="ace-btn" data-speed="80" id="speedFast">FAST</button>
        <button class="ace-btn" data-speed="300" id="speedSlow">SLOW</button>
        <button class="ace-btn" id="toggleAceAnim">&#9646;&#9646;</button>
      </div>
    </div>
  </div>

  <div class="cat-zone">
    <div class="cat-stage">
      <div class="cat-stage-title">&#9733; THE PIXEL CATS &#9733;</div>
      <div class="cat-scene" id="catScene"></div>
    </div>
  </div>

  <p style="margin-top:30px;font-size:clamp(7px,1.2vw,11px);color:#888;line-height:2">
    click a cat &rarr; they jump! &bull; click anywhere &rarr; confetti!<br>
    made with pixel love for Ace &#9829;
  </p>

</div>
</div>

<button class="music-btn" id="musicBtn">&#9835; PLAY</button>

<div id="floatingDecor"></div>
<canvas id="confetti-canvas"></canvas>

<script>
const cats = [
  {name:'Snowball', idle:'images/AllCatsDemo/AllCatsDemo/White/IdleCatttt.png', jump:'images/AllCatsDemo/AllCatsDemo/White/JumpCattttt.png'},
  {name:'Ginger', idle:'images/AllCatsDemo/AllCatsDemo/TigerCatFree/IdleCatt.png', jump:'images/AllCatsDemo/AllCatsDemo/TigerCatFree/JumpCattt.png'},
  {name:'Mochi', idle:'images/AllCatsDemo/AllCatsDemo/ThreeColorFree/IdleCatt.png', jump:'images/AllCatsDemo/AllCatsDemo/ThreeColorFree/JumpCattt.png'},
  {name:'Shadow', idle:'images/AllCatsDemo/AllCatsDemo/Brown/IdleCattt.png', jump:'images/AllCatsDemo/AllCatsDemo/Brown/JumpCatttt.png'},
  {name:'Noel', idle:'images/AllCatsDemo/AllCatsDemo/Xmas/Idle2Cattt.png', jump:'images/AllCatsDemo/AllCatsDemo/Xmas/JumpCatttt.png'},
  {name:'Pixel', idle:'images/AllCatsDemo/AllCatsDemo/Classical/IdleCat.png', jump:'images/AllCatsDemo/AllCatsDemo/Classical/JumpCat.png'},
];

const catScene = document.getElementById('catScene');
let catElements = [];

cats.forEach((cat, i) => {
  const div = document.createElement('div');
  div.className = 'cat-sprite idle';
  div.style.backgroundImage = `url('${cat.idle}')`;
  div.style.width = '96px';
  div.style.height = '96px';
  div.style.backgroundSize = 'auto 100%';
  div.style.animationDelay = `${i * 0.12}s`;
  div.dataset.idx = i;
  const label = document.createElement('span');
  label.className = 'cat-label';
  label.textContent = cat.name;
  div.appendChild(label);
  div.addEventListener('click', function(e) {
    e.stopPropagation();
    jumpCat(this, cat);
  });
  catScene.appendChild(div);
  catElements.push(div);
});

function jumpCat(el, cat) {
  if (el.classList.contains('jumping')) return;
  el.classList.remove('idle');
  el.classList.add('jumping');
  el.style.backgroundImage = `url('${cat.jump}')`;
  el.style.transform = 'translateY(-40px)';
  setTimeout(() => {
    el.classList.remove('jumping');
    el.classList.add('idle');
    el.style.backgroundImage = `url('${cat.idle}')`;
    el.style.transform = 'translateY(0)';
  }, 500);
}

// ace animation - lalove frames
const aceCanvas = document.getElementById('aceCanvas');
const aceCtx = aceCanvas.getContext('2d');
const totalFrames = 7;
let aceFrames = [];
let aceFrameIdx = 0;
let acePlaying = true;
let aceSpeed = 150;
let aceAnimId = null;

function preloadAceFrames(callback) {
  let loaded = 0;
  for (let i = 1; i <= totalFrames; i++) {
    const img = new Image();
    img.onload = function() {
      loaded++;
      if (loaded === totalFrames) callback();
    };
    img.onerror = function() {
      loaded++;
      if (loaded === totalFrames) callback();
    };
    img.src = `images/wow/lalove${i}.jpeg`;
    aceFrames.push(img);
  }
}

function drawAceFrame() {
  aceCtx.clearRect(0, 0, 128, 128);
  aceCtx.imageSmoothingEnabled = false;
  if (aceFrames[aceFrameIdx] && aceFrames[aceFrameIdx].complete && aceFrames[aceFrameIdx].naturalWidth > 0) {
    aceCtx.drawImage(aceFrames[aceFrameIdx], 0, 0, 128, 128);
  }
}

function aceAnimLoop() {
  if (!acePlaying) return;
  aceFrameIdx = (aceFrameIdx + 1) % totalFrames;
  drawAceFrame();
  aceAnimId = setTimeout(aceAnimLoop, aceSpeed);
}

function startAceAnim() {
  acePlaying = true;
  aceAnimId = setTimeout(aceAnimLoop, aceSpeed);
}

function stopAceAnim() {
  acePlaying = false;
  if (aceAnimId) clearTimeout(aceAnimId);
}

// ace controls
document.getElementById('speedNormal').addEventListener('click', function() {
  document.querySelectorAll('.ace-btn[data-speed]').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  aceSpeed = 150;
  if (acePlaying) { stopAceAnim(); startAceAnim(); }
});
document.getElementById('speedFast').addEventListener('click', function() {
  document.querySelectorAll('.ace-btn[data-speed]').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  aceSpeed = 80;
  if (acePlaying) { stopAceAnim(); startAceAnim(); }
});
document.getElementById('speedSlow').addEventListener('click', function() {
  document.querySelectorAll('.ace-btn[data-speed]').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  aceSpeed = 300;
  if (acePlaying) { stopAceAnim(); startAceAnim(); }
});
document.getElementById('toggleAceAnim').addEventListener('click', function() {
  if (acePlaying) {
    stopAceAnim();
    this.textContent = '\u25B6';
  } else {
    startAceAnim();
    this.textContent = '\u25AE\u25AE';
  }
});

aceCanvas.addEventListener('click', function() {
  document.getElementById('toggleAceAnim').click();
});

preloadAceFrames(function() {
  drawAceFrame();
  startAceAnim();
});

// floating balloons & stars - fewer on mobile
const isMobile = window.innerWidth < 540;
const decor = document.getElementById('floatingDecor');
const balloonColors = ['#ff0066','#ffcc00','#00ccff','#66ff66','#ff66cc','#ff8800'];
const balloonCount = isMobile ? 6 : 12;
for (let i = 0; i < balloonCount; i++) {
  const b = document.createElement('div');
  b.className = 'balloon floating';
  b.style.setProperty('--c', balloonColors[i % balloonColors.length]);
  b.style.left = Math.random() * 90 + '%';
  b.style.animationDuration = (12 + Math.random() * 15) + 's';
  b.style.animationDelay = -(Math.random() * 20) + 's';
  b.style.width = (isMobile ? 18 : 24 + Math.random() * 20) + 'px';
  b.style.height = (isMobile ? 24 : 30 + Math.random() * 25) + 'px';
  decor.appendChild(b);
}

const starCount = isMobile ? 8 : 20;
for (let i = 0; i < starCount; i++) {
  const s = document.createElement('div');
  s.className = 'star floating';
  s.style.left = Math.random() * 95 + '%';
  s.style.top = Math.random() * 90 + '%';
  s.style.setProperty('--d', (1.5 + Math.random() * 2) + 's');
  s.style.animationDelay = -(Math.random() * 3) + 's';
  s.style.width = s.style.height = (isMobile ? 4 : 6 + Math.random() * 8) + 'px';
  decor.appendChild(s);
}

// confetti
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let confettiPieces = [];
const confettiColors = ['#ff0066','#ffcc00','#00ccff','#66ff66','#ff66cc','#ff8800','#c44dff','#6b5bff'];

function spawnConfettiBurst(count, cx, cy) {
  cx = cx !== undefined ? cx : W / 2;
  cy = cy !== undefined ? cy : H / 2;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 8;
    confettiPieces.push({
      x: cx + (Math.random() - 0.5) * 120,
      y: cy + (Math.random() - 0.5) * 80,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 5,
      w: 4 + Math.random() * 8,
      h: 4 + Math.random() * 8,
      color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 10,
      life: 1,
      gravity: 0.15 + Math.random() * 0.1,
    });
  }
}

function updateConfetti() {
  ctx.clearRect(0, 0, W, H);
  for (let i = confettiPieces.length - 1; i >= 0; i--) {
    const p = confettiPieces[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.99;
    p.rot += p.rotV;
    p.life -= 0.005;
    if (p.life <= 0 || p.y > H + 20) {
      confettiPieces.splice(i, 1);
      continue;
    }
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  }
  requestAnimationFrame(updateConfetti);
}
updateConfetti();

document.addEventListener('click', function(e) {
  const burstCount = isMobile ? 15 : 30;
  spawnConfettiBurst(burstCount, e.clientX, e.clientY);
});

// initial burst on load (smaller on mobile)
window.addEventListener('load', function() {
  setTimeout(function() {
    const b1 = isMobile ? 25 : 60;
    spawnConfettiBurst(b1, W/2, H/3);
    setTimeout(function() {
      const b2 = isMobile ? 15 : 40;
      spawnConfettiBurst(b2, W*0.3, H*0.4);
      spawnConfettiBurst(b2, W*0.7, H*0.4);
    }, 400);
  }, 500);
});

// music / sound effects (simple beep using Web Audio)
let audioCtx = null;
let musicPlaying = false;
const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', function() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (!musicPlaying) {
    musicPlaying = true;
    musicBtn.textContent = '&#9835; ON';
    playBirthdayMelody();
  } else {
    musicPlaying = false;
    musicBtn.textContent = '&#9835; PLAY';
    if (audioCtx) audioCtx.close();
    audioCtx = null;
  }
});

function playBirthdayMelody() {
  if (!musicPlaying || !audioCtx) return;
  const notes = [
    {freq:262, dur:0.2}, {freq:262, dur:0.2}, {freq:294, dur:0.2}, {freq:262, dur:0.2},
    {freq:349, dur:0.2}, {freq:330, dur:0.3}, {freq:262, dur:0.2}, {freq:262, dur:0.2},
    {freq:294, dur:0.2}, {freq:262, dur:0.2}, {freq:392, dur:0.2}, {freq:349, dur:0.3},
    {freq:262, dur:0.2}, {freq:262, dur:0.2}, {freq:523, dur:0.2}, {freq:440, dur:0.2},
    {freq:349, dur:0.2}, {freq:330, dur:0.2}, {freq:294, dur:0.3},
    {freq:466, dur:0.2}, {freq:466, dur:0.2}, {freq:440, dur:0.2}, {freq:349, dur:0.2},
    {freq:392, dur:0.2}, {freq:349, dur:0.3},
  ];
  let time = audioCtx.currentTime;
  notes.forEach(n => {
    if (!musicPlaying) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = n.freq;
    gain.gain.setValueAtTime(0.08, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + n.dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + n.dur);
    time += n.dur + 0.02;
  });
  setTimeout(playBirthdayMelody, (time - audioCtx.currentTime) * 1000 + 500);
}
</script>
